---
apiVersion: v1
kind: Service
metadata:
  name: mpc-worker-service
  labels:
    app: mpc-worker
spec:
  selector:
    app: mpc-worker
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP