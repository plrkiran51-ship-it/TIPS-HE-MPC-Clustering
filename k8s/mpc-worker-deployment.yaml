            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpc-worker-2
  labels:
    app: mpc-worker
    party: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mpc-worker
      party: "2"
  template:
