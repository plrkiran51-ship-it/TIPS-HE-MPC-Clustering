      app: mpc-worker
      party: "1"
  template:
    metadata:
      labels:
        app: mpc-worker
        party: "1"
    spec:
      containers:
      - name: mpc-worker
        image: tips-he-mpc:latest
        env:
        - name: PARTY_ID
          value: "1"
        - name: NUM_PARTIES
          valueFrom:
